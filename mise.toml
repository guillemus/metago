[tasks.install-skill]
description = "Synchronize the repository's Metago skill with the global agent skill"
run = '''
set -eu
source="{{config_root}}/skills/metago/SKILL.md"
target="${METAGO_SKILL_PATH:-$HOME/.agents/skills/metago/SKILL.md}"
install -d "$(dirname "$target")"
install -m 0644 "$source" "$target"
cmp -s "$source" "$target"
printf 'Installed Metago skill: %s\n' "$target"
'''

[tasks.sql]
dir = "{{config_root}}/experiments/sql"
run = "go run ."

[tasks.docs]
description = "Preview the documentation at http://localhost:3000"
run = "hugo server --source docs --port 3000"

[tasks.docs-build]
description = "Format Markdown and build documentation into dist/"
run = """
npm install --prefix docs
npm exec --prefix docs -- prettier --write "{*.md,**/*.md}"
hugo --source docs --destination ../dist --minify
"""

[tasks.docs-deploy]
description = "Build and deploy the documentation to Cloudflare Pages"
depends = ["docs-build"]
run = "npx wrangler pages deploy dist --project-name metago --branch main --commit-dirty=true"
