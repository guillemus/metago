{{ define "main" }}
{{ if .Params.toc }}
<div class="docs-shell">
  <aside class="docs-toc" aria-label="On this page">
    <div class="docs-toc-label">Contents</div>
    {{ .TableOfContents }}
  </aside>
  <article class="docs-copy min-w-0">
    <div class="mb-3 font-mono text-xs font-medium uppercase tracking-[.18em] text-primary">{{ .Params.eyebrow | default "Metago documentation" }}</div>
    {{ .Content }}
  </article>
</div>
{{ else }}
<article class="docs-copy mx-auto max-w-4xl">
  <div class="mb-3 font-mono text-xs font-medium uppercase tracking-[.18em] text-primary">{{ .Params.eyebrow | default "Metago documentation" }}</div>
  {{ .Content }}
</article>
{{ end }}
{{ end }}
