<!doctype html>
<html lang="{{ site.Language.Locale }}" data-theme="metago">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <link rel="icon" type="image/png" href="{{ "favicon.png" | relURL }}">
  <title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ site.Title }}</title>
  <link rel="preload" href="{{ "fonts/manrope-latin.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ "fonts/dm-mono-400-latin.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
  {{ with (templates.Defer (dict "key" "global-css")) }}
    {{ partial "css.html" . }}
  {{ end }}
</head>
<body class="min-h-screen bg-base-100 text-base-content">
  {{ partial "header.html" . }}
  <main class="mx-auto w-full {{ if .IsHome }}max-w-[120rem]{{ else if .Params.toc }}max-w-7xl{{ else }}max-w-5xl{{ end }} px-5 py-10 md:px-8 md:py-14">{{ block "main" . }}{{ end }}</main>
</body>
</html>
