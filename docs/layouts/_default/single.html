{{ define "main" }}
<article class="docs-copy">
  <div class="mb-3 font-mono text-xs font-medium uppercase tracking-[.18em] text-primary">Metago documentation</div>
  {{ .Content }}
</article>
<nav class="mt-16 grid gap-3 border-t border-base-300 pt-8 sm:grid-cols-2" aria-label="Pagination">
  {{ with .PrevInSection }}<a class="btn btn-ghost h-auto justify-start py-4 text-left" href="{{ .RelPermalink }}">← {{ .Title }}</a>{{ end }}
  {{ with .NextInSection }}<a class="btn btn-ghost h-auto justify-end py-4 text-right sm:col-start-2" href="{{ .RelPermalink }}">{{ .Title }} →</a>{{ end }}
</nav>
{{ end }}
