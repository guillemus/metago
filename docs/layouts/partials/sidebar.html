<div class="flex min-h-full w-72 flex-col bg-base-200 px-4 py-6">
  <a href="{{ site.Home.RelPermalink }}" class="mb-8 flex items-center gap-3 px-3 no-underline">
    <span class="grid size-9 place-items-center rounded-lg bg-primary font-mono text-lg font-bold text-primary-content">m</span>
    <span><strong class="block text-lg leading-5">Metago</strong><small class="font-mono text-xs text-base-content/55">code, generated</small></span>
  </a>
  <ul class="menu menu-sm w-full gap-1 p-0">
    <li class="menu-title">Documentation</li>
    {{ range site.RegularPages.ByWeight }}
      <li><a href="{{ .RelPermalink }}" {{ if eq $.RelPermalink .RelPermalink }}class="menu-active font-semibold" aria-current="page"{{ end }}>{{ .Title }}</a></li>
    {{ end }}
  </ul>
  <div class="mt-auto border-t border-base-300 px-3 pt-5">
    <a class="link link-hover text-sm text-base-content/65" href="{{ site.Params.github }}">GitHub ↗</a>
  </div>
</div>
